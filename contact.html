<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Kritsada Nuanprakob</title>
    <style>
        /* --- 1. การตั้งค่าพื้นฐาน --- */
        body {
            cursor: none; 
            font-family: 'Roboto Mono', monospace, 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden; 
        }

        /* --- 2. วิดีโอพื้นหลัง --- */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; 
            z-index: -2; 
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(18, 18, 18, 0.6); /* ปรับให้สว่างขึ้นนิดนึงเพื่อให้เห็นพื้นหลังชัด */
            z-index: -1;
        }

        /* --- 3. Custom Cursor (สีฟ้า Neon) --- */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #00ffcc; /* เปลี่ยนเป็นสีฟ้าเรืองแสง */
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none; 
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #00ffcc; /* เพิ่มเงาให้จุดเมาส์ */
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid #00ffcc; /* ขอบเมาส์สีฟ้า */
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background-color 0.2s; 
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); /* เพิ่มเงาบางๆ ให้วงแหวน */
        }

        /* --- สไตล์ของเนื้อหา --- */
        .contact-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            color: #00ffcc; /* สีตัวอักษรฟ้า */
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.8); /* เอฟเฟกต์เรืองแสงที่ตัวอักษร */
        }

        p {
            font-size: 1.2rem;
            color: #b2fff0; /* สีฟ้าอ่อนๆ สำหรับข้อความรอง */
            margin-bottom: 4rem;
            letter-spacing: 1px;
        }

        .social-icons {
            display: flex;
            gap: 40px;
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: rgba(26, 26, 26, 0.5); 
            color: #00ffcc; /* สีไอคอนฟ้า */
            font-size: 2.5rem;
            text-decoration: none;
            border: 2px solid #00ffcc; /* ขอบปุ่มสีฟ้า */
            transition: all 0.3s ease;
            cursor: none; 
            backdrop-filter: blur(5px); 
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); /* เรืองแสงเบาๆ ตลอดเวลา */
        }

        .icon-btn:hover {
            transform: translateY(-10px);
            background-color: #00ffcc; /* พื้นหลังปุ่มเปลี่ยนเป็นสีฟ้าตอน Hover */
            color: #121212; /* สีไอคอนเปลี่ยนเป็นสีดำเพื่อให้ตัดกัน */
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.9); /* เรืองแสงแรงขึ้น */
        }

        .back-btn {
            margin-top: 4rem;
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s;
            cursor: none;
        }

        .back-btn:hover {
            color: #00ffcc;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        
        /* --- 4. Responsive Design (รองรับหน้าจอโทรศัพท์และ iPad) --- */
        @media (max-width: 768px) {
            /* ย่อขนาดหัวข้อและข้อความ */
            h1 {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }
            p {
                font-size: 1rem;
                margin-bottom: 3rem;
                padding: 0 1rem; /* เพิ่มขอบซ้ายขวาไม่ให้ข้อความติดขอบจอ */
            }

            /* ลดขนาดปุ่มไอคอนและช่องว่าง */
            .social-icons {
                gap: 20px;
            }
            .icon-btn {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }

            /* ซ่อน Custom Cursor เรืองแสงทิ้งไป เพราะมือถือใช้นิ้วทัช */
            .cursor-dot, .cursor-outline {
                display: none !important;
            }
            
            /* คืนค่า Cursor ปกติ เผื่อระบบแตะหน้าจอของมือถือ */
            body, .icon-btn, .back-btn {
                cursor: auto; 
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <video autoplay loop muted playsinline class="video-bg">
        <source src="bg-video.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="contact-container">
        <h1>Get in Touch</h1>
        <p>สามารถติดต่อผมได้ผ่านช่องทางด้านล่างนี้ครับ</p>

        <div class="social-icons">
            <a href="https://www.instagram.com/num.ngo_/" target="_blank" class="icon-btn">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.facebook.com/kritsada.nuanprakob.2024" target="_blank" class="icon-btn">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="https://line.me/ti/p/1cHxjnxxEf" target="_blank" class="icon-btn">
                <i class="fa-brands fa-line"></i>
            </a>
        </div>

        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>

    <script>
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        const interactiveElements = document.querySelectorAll('a'); 

        window.addEventListener('mousemove', function (e) {
            const posX = e.clientX;
            const posY = e.clientY;

            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;

            cursorOutline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 150, fill: "forwards" });
        });

        interactiveElements.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursorOutline.style.width = '70px';
                cursorOutline.style.height = '70px';
                // เปลี่ยนสีวงแหวนตอน Hover ให้เป็นสีฟ้าโปร่งแสง
                cursorOutline.style.backgroundColor = 'rgba(0, 255, 204, 0.2)'; 
            });

            link.addEventListener('mouseleave', () => {
                cursorOutline.style.width = '40px';
                cursorOutline.style.height = '40px';
                cursorOutline.style.backgroundColor = 'transparent';
            });
        });
    </script>

</body>
</html>
